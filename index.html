<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🐙 GitHub Profile Finder</h1>
        <p class="subtitle">
Discover GitHub Profiles & Battle Developers ⚔️
</p>

        <input
            type="text"
            id="username"
            placeholder="Enter GitHub username">

        <button id="searchBtn">
            Search
        </button>
        <div id="profile"></div>

        <div id="loader"></div>


        <div id="repos"></div>

    

    
<hr>

<h2>GitHub Battle ⚔️</h2>

<input
    type="text"
    id="user1"
    placeholder="Enter First Username"
>

<input
    type="text"
    id="user2"
    placeholder="Enter Second Username"
>

<button id="battleBtn">
    Battle
</button>

<div id="battleResult"></div>

</div>

<script src="script.js"></script>
</body>
</html>
